name: masterchas_app
description: MasterChas mobile application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_lucide: ^1.11.0
  flutter_riverpod: ^3.3.2
  flutter_secure_storage: ^10.3.1
  dio: ^5.8.0+1
  signalr_netcore: ^1.3.6
  go_router: ^17.3.0
  image_picker: ^1.1.2
  google_fonts: ^6.2.1
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
